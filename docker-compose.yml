services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: rag_mlflow
    restart: unless-stopped
    command:
      - bash
      - -c
      - "pip install mlflow==2.19.0 --quiet && mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri /mlflow/mlruns --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5002:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── RAG Application ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://raguser:ragpassword@db:5432/ragdb
      MLFLOW_TRACKING_URI: http://mlflow:5001
    volumes:
      - faiss_data:/app/faiss_index
      - upload_data:/app/uploads
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  # ─── Streamlit Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_frontend
    restart: unless-stopped
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_BASE_URL: http://app:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  postgres_data:
  mlflow_data:
  faiss_data:
  upload_data:
